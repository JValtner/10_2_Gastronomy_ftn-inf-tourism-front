<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Gastronomy tour</title>
  <link rel="stylesheet" href="tourReservationsForm.scss" />
  <script type="module" src="tourReservationsForm.ts"></script>
</head>
<body>
  <nav class="navbar">
    <ul class="nav-list">
      <li class="nav-item"><a href="../../../index.html">Home</a></li>
      <li class="nav-item"><a href="../../../tours/pages/userTours/userTours.html">My tours</a></li>
      <li class="nav-item"><a href="../../../tours/pages/tourForm/tourForm.html">Add new tour</a></li>
      <li class="nav-item"><a href="../../../keypoints/pages/keypoints/keypoints.html">Keypoints</a></li>
      <li class="nav-item" id="login"><a href="users/pages/login/login.html">Login</a></li>
      <li class="nav-item" id="logout"><a href="../../../index.html">Logout</a></li>
    </ul>
  </nav>

  <section class="main">
    <div class="main-welcome">
      <h3></h3>
    </div>

    <div class="main-content">
      <div class="form-container">
        <div class="form-entry">
          <form id="form-data">
            <div class="form-row">
              <p class="tour-name" id ="tour-name">Tour name:</p>
              <span class="error-msg" id="name-err"></span>
            </div>
            <div class="form-row">
              <p class="user-name" id="user-name">User name:</p>
              <span class="error-msg" id="user-name-err"></span>
            </div>
            <div class="form-row">
              <p class="tour-date" id="tour-date">Date and time:</p>
              <span class="error-msg" id="datetime-err"></span>
            </div>
            <div class="form-row">
              <p class="tour-maxGuests" id="tour-maxGuests">Ukupan broj mesta na turi:</p>
              <p class="tour-availableGuests" id="tour-availableGuests">Raspoloziv broj mesta na turi:</p>
              <span class="error-msg" id="datetime-err"></span>
            </div>
            <div class="form-row">
              <label for="numGuests">Broj Gostiju: </label>
              <input id="numGuests" type="number" name="numGuests" required />
              <span class="error-msg" id="numGuests-err"></span>
            </div>
            

            <div class="form-row-Btn">
              <div class="tooltip bottom">
                <button type="button" id="btn-user-tours" class="back-btn">Nazad</button>
                <span class="tooltiptext">Nastavi sa pregledom tura</span>
              </div>
              <div class="tooltip bottom">
                <button type="button" id="btn-my-reservations" class="submit-btn" disabled>Rezervisi</button>
                <span class="tooltiptext">Rezervisi i prikazi moje rezervacije</span>
              </div>
            </div>

            <div class="form-row">
              <div id="status-msg" class="status-msg" style="display: none;">
                <span id="status-text"></span>
                <div class="status-bar"></div>
              </div>
            </div>
            <div class="form-row">
              <p id="error-msg"></p>
            </div>
          </form>
        </div>
        <div class="form-decoration"></div>
      </div>
    </div>
  </section>
</body>
</html>
