<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Gastronomy tour</title>
        <link rel="stylesheet" href="userTours.scss">
        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
        <script type="module" src="userTours.ts"></script>
        <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    </head>
    <body>
        <nav class="navbar">
            <ul class="nav-list">
                <li class="nav-item"><a href="../../../index.html">Home</a></li>
                <li class="nav-item"><a href="#">My tours</a></li>
                <li class="nav-item"><a href="../tourForm/tourForm.html">Add new tour</a></li>
                <li class="nav-item"><a href="../../../keypoints/pages/keypoints/keypoints.html">Keypoints</a></li>
                <li class="nav-item" id="login"><a href="users/pages/login/login.html">Login</a></li>
                <li class="nav-item" id="logout"><a href="../../../index.html">Logout</a></li>
            </ul>
        </nav>
        <section class="main">
            <div class="main-welcome">
                <h3></h3>
                
            </div>
            <div class="main-options">
                <div class="tooltip left">
                    <button id="addNewTour" onclick="window.location.href='../tourForm/tourForm.html?action=new'">Add new tour</button>


                    <span class="tooltiptext">Add new tour</span>
                </div> 
            </div>
            <div class="main-content">
                <div class="statistics"> 
                    <div class="nav-statistics">
                        <div class="statistics-controls">
                            <label for="start-date">Pocetni Datum:</label>
                            <input type="date" id="start-date">

                            <label for="end-date">Krajnji datum :</label>
                            <input type="date" id="end-date">
                        </div>
                    </div>
                    <div class="statistics-display">  
                    </div>       
                </div>
                <div id="pagination-bar">
                    <div class="Nav-paged">
                        <hr>
                        <div class="pagination-center">
                            <nav class="pagination">
                                <button id="prev-page" class="page-btn">«</button>
                                <span id="current-page">1</span> / <span id="total-pages">1</span>
                                <button id="next-page" class="page-btn">»</button>
                            </nav>
                            </div>
                            <div class="pagination-controls">
                            <label for="page-size">Tura po strani:</label>
                            <select id="page-size">
                                <option value="5">5</option>
                                <option value="10" selected>10</option>
                                <option value="20">20</option>
                            </select>

                            <label for="sort-by">Sortiraj prema :</label>
                            <select id="sort-by">
                                <option value="Name">Nazivu</option>
                                <option value="DateTime" selected>Datumu</option>
                                <option value="MaxGuests">Broju Mesta</option>
                            </select>
                            <label for="order-by">Prikaz:</label>
                            <select id="order-by">
                                <option value="desc">Opadajucem</option>
                                <option value="asc" selected>Rastucem</option>
                            </select>
                        </div>
                        <hr>
                    </div> 
                </div>
                <div class="tour-container">
                    
                    
                </div>  
            </div>
        </section>
    </body>
</html>
